<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
    >

    <title>SafeBank | Crear cuenta</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link href="/css/styleRegistro.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="register-body">

<main class="register-page">

    <section class="register-card">

        <div class="register-brand">
            <div class="register-brand-icon">
                <i class="bi bi-shield-lock-fill"></i>
            </div>

            <div>
                <span class="register-brand-name">SafeBank</span>
                <span class="register-brand-subtitle">
                    Banca segura y confiable
                </span>
            </div>
        </div>

        <div class="register-heading">
            <span class="register-label">
                <i class="bi bi-person-plus"></i>
                Nueva cuenta
            </span>

            <h1>Crea tu cuenta</h1>

            <p>
                Completa tus datos personales para comenzar a utilizar
                SafeBank.
            </p>
        </div>

        <form onsubmit="event.preventDefault(); registrarUsuario();">

            <div class="row g-3">

                <div class="col-md-6">
                    <label for="dni" class="form-label">
                        DNI
                    </label>

                    <div class="register-input-group">
                        <i class="bi bi-person-vcard"></i>

                        <input
                                id="dni"
                                type="text"
                                class="form-control"
                                placeholder="Ingresa tu DNI"
                                inputmode="numeric"
                                autocomplete="off"
                                maxlength="8"
                                required
                        >
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="celular" class="form-label">
                        Celular
                    </label>

                    <div class="register-input-group">
                        <i class="bi bi-phone"></i>

                        <input
                                id="celular"
                                type="tel"
                                class="form-control"
                                placeholder="Ingresa tu celular"
                                inputmode="tel"
                                autocomplete="tel"
                                required
                        >
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="nombres" class="form-label">
                        Nombres
                    </label>

                    <div class="register-input-group">
                        <i class="bi bi-person"></i>

                        <input
                                id="nombres"
                                type="text"
                                class="form-control"
                                placeholder="Ingresa tus nombres"
                                autocomplete="given-name"
                                required
                        >
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="apellidos" class="form-label">
                        Apellidos
                    </label>

                    <div class="register-input-group">
                        <i class="bi bi-person"></i>

                        <input
                                id="apellidos"
                                type="text"
                                class="form-control"
                                placeholder="Ingresa tus apellidos"
                                autocomplete="family-name"
                                required
                        >
                    </div>
                </div>

                <div class="col-12">
                    <label for="correo" class="form-label">
                        Correo electrónico
                    </label>

                    <div class="register-input-group">
                        <i class="bi bi-envelope"></i>

                        <input
                                id="correo"
                                type="email"
                                class="form-control"
                                placeholder="nombre@correo.com"
                                autocomplete="email"
                                required
                        >
                    </div>
                </div>

                <div class="col-12">
                    <label for="direccion" class="form-label">
                        Dirección
                    </label>

                    <div class="register-input-group">
                        <i class="bi bi-geo-alt"></i>

                        <input
                                id="direccion"
                                type="text"
                                class="form-control"
                                placeholder="Ingresa tu dirección"
                                autocomplete="street-address"
                                required
                        >
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="usernameRegistro" class="form-label">
                        Usuario
                    </label>

                    <div class="register-input-group">
                        <i class="bi bi-at"></i>

                        <input
                                id="usernameRegistro"
                                type="text"
                                class="form-control"
                                placeholder="Crea un usuario"
                                autocomplete="username"
                                required
                        >
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="passwordRegistro" class="form-label">
                        Contraseña
                    </label>

                    <div class="register-input-group password-register-group">
                        <i class="bi bi-lock"></i>

                        <input
                                id="passwordRegistro"
                                type="password"
                                class="form-control"
                                placeholder="Crea una contraseña"
                                autocomplete="new-password"
                                required
                        >

                        <button
                                type="button"
                                class="register-password-button"
                                aria-label="Mostrar contraseña"
                                onclick="togglePassword('passwordRegistro', this)"
                        >
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

            </div>

            <p
                    id="mensajeRegistro"
                    class="register-error-message"
                    role="alert"
                    aria-live="polite"
            ></p>

            <button
                    type="submit"
                    class="btn register-submit-button w-100"
            >
                <span>Crear mi cuenta</span>
                <i class="bi bi-arrow-right"></i>
            </button>

        </form>

        <div class="register-login-link">
            <span>¿Ya tienes una cuenta?</span>
            <a href="/login">Iniciar sesión</a>
        </div>

        <div class="register-security-message">
            <i class="bi bi-shield-check"></i>
            <span>Tus datos se procesan de forma segura</span>
        </div>

    </section>

</main>

<script src="/js/script.js"></script>
</body>
</html>
