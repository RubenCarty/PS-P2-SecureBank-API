<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>SafeBank | Iniciar sesión</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link href="/css/styleLogin.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>

<main class="auth-page">
    <section class="auth-card">

        <div class="brand-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <div class="text-center mb-4">
            <h1 class="brand-title">SafeBank</h1>
            <p class="brand-description">
                Ingresa tus credenciales para acceder a tu cuenta.
            </p>
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); login();">

            <div class="mb-3">
                <label for="username" class="form-label">
                    Usuario
                </label>

                <div class="input-group custom-input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>

                    <input
                            id="username"
                            name="username"
                            type="text"
                            class="form-control"
                            placeholder="Ingresa tu usuario"
                            autocomplete="username"
                            required
                    >
                </div>
            </div>

            <div class="mb-2">
                <label for="password" class="form-label">
                    Contraseña
                </label>

                <div class="input-group custom-input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input
                            id="password"
                            name="password"
                            type="password"
                            class="form-control"
                            placeholder="Ingresa tu contraseña"
                            autocomplete="current-password"
                            required
                    >

                    <button
                            type="button"
                            class="btn password-button"
                            aria-label="Mostrar contraseña"
                            onclick="togglePassword('password', this)"
                    >
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input
                            id="remember"
                            class="form-check-input"
                            type="checkbox"
                    >
                    <label class="form-check-label" for="remember">
                        Recordarme
                    </label>
                </div>

                <a href="/forgot-password" class="secondary-link">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <div
                    id="mensaje"
                    class="alert alert-danger error-message"
                    role="alert"
                    aria-live="polite"
            ></div>

            <button type="submit" class="btn login-button w-100">
                <span>Ingresar</span>
                <i class="bi bi-arrow-right"></i>
            </button>

        </form>

        <div class="register-section">
            <span>¿Aún no tienes una cuenta?</span>
            <a href="/register">Crear cuenta</a>
        </div>

        <div class="security-message">
            <i class="bi bi-shield-check"></i>
            <span>Tu información está protegida</span>
        </div>

    </section>
</main>

<script src="/js/script.js"></script>
</body>
</html>
